name: OdooCodePilot — Validación de módulos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validar:
    name: Validar módulos Odoo
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar validador
        run: python pipeline/validator.py

      - name: Resumen en caso de éxito
        if: success()
        run: |
          echo "✅ Todos los módulos pasaron la validación"
          echo "Listo para hacer merge a main"

      - name: Resumen en caso de error
        if: failure()
        run: |
          echo "❌ Se encontraron errores en los módulos"
          echo "Corrige los errores antes de hacer merge"